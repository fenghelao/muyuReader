# 打包 = 神似而非全等(PROJECT_PLAN §9.2 / §12):显示名用 MuYuReader,bundleId 用自有域名规避商标
appId: com.fenghelao.muyureader
productName: MuYuReader
directories:
  buildResources: build
files:
  - out/**
  - '!**/*.map'
win:
  executableName: MuYuReader
  icon: build/claude.ico
mac:
  category: public.app-category.productivity
  icon: build/claude.icns
  extendInfo:
    CFBundleName: MuYuReader
    CFBundleDisplayName: MuYuReader
linux:
  category: Utility
